<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFlood Bandung</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ═══ HEADER ═══════════════════════════════════════════ -->
    <header class="app-header">
        <div class="brand">
            <img src="Dokumentasi/Logo-Bandung.png" alt="Logo Kota Bandung" class="brand-logo">
            <div class="brand-text">
                <div class="brand-name">GeoFlood <span>Kota Bandung</span></div>
                <div class="brand-sub">SIG Pemetaan Kerawanan Banjir Terintegrasi</div>
            </div>
        </div>

        <div class="header-sep"></div>

        <!-- PREDIKSI REALTIME -->
        <div class="pred-badge" id="predBadge">
            <div class="pred-dot" id="predDot"></div>
            <span class="pred-label" id="predLabel">Memuat prediksi…</span>
        </div>

        <div class="header-sep"></div>

        <!-- SEARCH -->
        <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Cari kelurahan…" autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
    </header>

    <!-- ═══ PREDIKSI PANEL (popup detail) ═══════════════════ -->
    <div class="pred-panel" id="predPanel">
        <div class="pred-panel-header">
            <div class="pp-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Prediksi Banjir Realtime
            </div>
            <button class="pp-close" onclick="document.getElementById('predPanel').classList.remove('open')">✕</button>
        </div>
        <div id="predPanelBody" class="pred-panel-body">Memuat…</div>
    </div>

    <!-- ═══ LAYER PANEL ══════════════════════════════════════ -->
    <div class="layer-panel">
        <div class="panel-section">
            <div class="panel-label">Basemap</div>
            <div class="basemap-options">
                <button class="bmap-btn" data-map="streets">Jalan</button>
                <button class="bmap-btn" data-map="satellite">Satelit</button>
                <button class="bmap-btn active" data-map="light">Minimal</button>
            </div>
        </div>
        <div class="divider"></div>
        <div class="panel-section">
            <div class="panel-label">Layer Peta</div>
            <label class="toggle-row">
                <div class="toggle-info"><span class="dot" style="background:#f87171"></span>Zona Kerawanan</div>
                <div class="toggle on" data-layer="zona"><div class="toggle-thumb"></div></div>
            </label>
            <label class="toggle-row">
                <div class="toggle-info"><span class="dot" style="background:#60a5fa"></span>Aliran Sungai</div>
                <div class="toggle on" data-layer="sungai"><div class="toggle-thumb"></div></div>
            </label>
            <label class="toggle-row">
                <div class="toggle-info"><span class="dot" style="background:#94a3b8"></span>Batas Wilayah</div>
                <div class="toggle on" data-layer="batas"><div class="toggle-thumb"></div></div>
            </label>
            <label class="toggle-row">
                <div class="toggle-info"><span class="dot" style="background:#ef4444"></span>Titik Kejadian</div>
                <div class="toggle on" data-layer="historis"><div class="toggle-thumb"></div></div>
            </label>
        </div>
        <div class="divider"></div>
        <div class="panel-section">
            <div class="panel-label">Legenda Zona</div>
            <div class="legend-item"><span class="leg-swatch" style="background:#fca5a5"></span>Bahaya Tinggi</div>
            <div class="legend-item"><span class="leg-swatch" style="background:#fcd34d"></span>Waspada</div>
            <div class="legend-item"><span class="leg-swatch" style="background:#86efac"></span>Aman</div>
        </div>
    </div>

    <!-- ═══ INFO PANEL ═══════════════════════════════════════ -->
    <div class="info-panel" id="infoPanel">
        <button class="info-close" onclick="closeInfoPanel()">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="info-badge-loc">Kelurahan</div>
        <div class="info-name" id="infoName">—</div>
        <div class="info-coords" id="infoCoords">—</div>

        <!-- Flood risk for this area -->
        <div class="info-risk-row" id="infoRiskRow" style="display:none">
            <div class="irr-label">Risiko Area</div>
            <div class="irr-value" id="infoRiskValue">—</div>
        </div>

        <div class="weather-card" id="weatherCard">
            <div class="wc-loading">Memuat cuaca…</div>
        </div>
    </div>

    <!-- ═══ MAP ══════════════════════════════════════════════ -->
    <div id="map"></div>

    <!-- ═══ ZOOM ══════════════════════════════════════════════ -->
    <div class="zoom-ctrl">
        <button onclick="map.zoomIn()">+</button>
        <button onclick="map.zoomOut()">−</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
